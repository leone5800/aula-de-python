<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprenda Python — Material Interativo</title>
  <meta name="description" content="Material didático interativo para ensinar Python: aulas, exemplos executáveis, quizzes, complete o código e desafios práticos." />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuToggle" class="menu-toggle" aria-label="Abrir menu de aulas" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">Py</div>
      <div>
        <h1 class="brand-title">Aprenda Python</h1>
        <p class="brand-sub">Material interativo para professores e alunos</p>
      </div>
    </div>
    <div class="py-status" id="pyStatus" role="status" aria-live="polite">
      <span class="dot" id="pyDot"></span>
      <span id="pyStatusText">Carregando Python...</span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Lista de aulas">
      <div class="progress-box">
        <div class="progress-label">
          <span>Seu progresso</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <nav id="moduleNav" class="module-nav"></nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>

    <main class="content" id="content" tabindex="-1"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
  <script src="lessons.js"></script>
  <script src="script.js"></script>
</body>
</html>
